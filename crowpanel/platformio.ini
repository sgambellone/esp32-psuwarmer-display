; =============================================================================
; PSU Warmer Display — Elecrow CrowPanel 5" (ESP32-S3-WROOM-1-N4R8)
; =============================================================================

[env:crowpanel_5]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

; ---------- serial monitor ----------
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
monitor_dtr     = 0
monitor_rts     = 0

; ---------- memory ----------
; CrowPanel uses ESP32-S3-WROOM-1-N4R8: 4MB flash (N4), 8MB PSRAM (R8, OPI)
; qio_opi = QIO flash + OPI PSRAM (full-speed octal interface, CONFIG_SPIRAM_MODE_OCT)
; huge_app.csv: gives ~3MB to the app partition instead of default.csv's 1.25MB.
; At 61.7% used on default.csv (789KB / 1280KB), switching now while there is
; still headroom. huge_app drops usage to ~25% (789KB / 3072KB).
board_build.arduino.memory_type = qio_opi
board_build.arduino.partitions  = huge_app.csv
board_upload.flash_size          = 4MB

; ---------- build flags ----------
build_flags =
    -O2
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; NOTE: -mfix-esp32-psram-cache-issue removed — that flag patches a silicon
    ; bug in the original ESP32 rev 0 and is a no-op (with minor overhead) on S3.
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_TICK_CUSTOM=1
    -DLV_TICK_CUSTOM_INCLUDE='"Arduino.h"'
    -DLV_TICK_CUSTOM_SYS_TIME_EXPR='((uint32_t)millis())'
    -DCORE_DEBUG_LEVEL=0
    ; LV_COLOR_16_SWAP is set to 1 directly in include/lv_conf.h — do NOT
    ; also set it here as a build flag; that causes a redefinition warning
    ; on every LVGL source file and the header value wins anyway.
    -I "${PROJECT_SRC_DIR}"
    -I "${PROJECT_INCLUDE_DIR}"

; Exclude demos/examples from compilation — they must be present on disk for
; LVGL header resolution but should not be compiled as project source files.
; Their internal relative includes (../../../lvgl.h) break when compiled here.
build_src_filter =
    +<*>
    -<demos/*>
    -<examples/*>

; ---------- libraries ----------
lib_deps =
    lvgl/lvgl                 @ ^8.4.0
    https://github.com/lovyan03/LovyanGFX.git#1.2.19 ; Latest release (Jan 2025). 1.2.x adds
                                                       ; bounce_buffer for Panel_RGB which
                                                       ; permanently eliminates PSRAM bus
                                                       ; contention tearing on ESP32-S3.
    Wire
    Preferences

; ---------- upload — auto-reset via 1200bps touch ----------
; 115200 chosen for stability — 230400 and 460800 both caused mid-flash
; failures (C700 inflate error, D04E md5sum failure) on this USB path.
upload_protocol = esptool
upload_speed    = 115200
upload_flags    =
    --before=default_reset
    --after=hard_reset

board_upload.use_1200bps_touch    = true
board_upload.wait_for_upload_port = true