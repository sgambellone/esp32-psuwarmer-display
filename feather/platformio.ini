; =============================================================================
; Battery Warmer Controller - ESP32-S3 Feather  (headless — display on CrowPanel)
; =============================================================================

[env:feather_esp32s3]
platform   = espressif32
board      = adafruit_feather_esp32s3
framework  = arduino

; ---------- serial monitor ----------
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
monitor_dtr     = 0        ; prevent monitor open/close from resetting the board
monitor_rts     = 0        ; same — native USB CDC resets on DTR/RTS toggle
; monitor_port auto-detected. Uncomment + set if multiple boards are connected:
; monitor_port = COM7

; ---------- PSRAM ----------
; N4R2 uses QSPI PSRAM — let the board definition handle memory type
board_build.arduino.memory_type = qio_qspi

; ---------- build flags ----------
build_flags =
    -O2
    -finline-functions
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I "${PROJECT_INCLUDE_DIR}"
    -DCORE_DEBUG_LEVEL=0    ; 0=silent in production, 3=verbose for debugging

; ---------- library dependencies ----------
; LVGL, HX8357, TSC2007 removed — display now on CrowPanel via UART
lib_deps =
    WiFi
    SD
    adafruit/Adafruit GFX Library      @ ^1.11.9
    adafruit/Adafruit BusIO            @ ^1.16.1
    adafruit/Adafruit MAX31865 library @ ^1.1.5
    adafruit/Adafruit Unified Sensor   @ ^1.1.14
    adafruit/Adafruit BME680 Library   @ ^2.0.4
    4-20ma/ModbusMaster                @ ^2.0.1

; ---------- upload — auto-reset via 1200bps touch, no BOOT button needed ----------
; How it works: esptool opens CDC port at 1200 baud → firmware self-resets into
; ROM bootloader → board re-enumerates → PlatformIO waits for new port → uploads.
; First flash on a brand-new board still needs manual BOOT+RESET once.
upload_protocol = esptool
upload_speed    = 460800
upload_flags    =
    --before=default_reset
    --after=hard_reset

board_upload.use_1200bps_touch    = true
board_upload.wait_for_upload_port = true